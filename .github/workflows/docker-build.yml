name: docker-build
on:
  push: { branches: [main] }
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion, matching_engine, vyaparcard, livelink, activity_engine, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t vyapardhara/${{ matrix.service }}:ci services/${{ matrix.service }}
